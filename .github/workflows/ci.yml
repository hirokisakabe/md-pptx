name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: E2E Test
        run: npm run test:e2e

      - name: Build
        run: npm run build

      # VS Code Extension
      - name: "[vscode] Install dependencies"
        run: npm ci
        working-directory: vscode-extension

      - name: "[vscode] Typecheck"
        run: npm run typecheck
        working-directory: vscode-extension

      - name: "[vscode] Lint"
        run: npm run lint
        working-directory: vscode-extension

      - name: "[vscode] Format check"
        run: npm run format:check
        working-directory: vscode-extension

      - name: "[vscode] Build"
        run: npm run build
        working-directory: vscode-extension
